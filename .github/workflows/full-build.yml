name: Full Build

on:
push:
branches:
- main
- develop

pull_request:
branches:
- main
- develop

workflow_dispatch:

jobs:
backend:
name: Backend
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: backend

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: '9.0.x'

  - name: Restore backend dependencies
    run: dotnet restore GeorgeApp.sln

  - name: Build backend
    run: dotnet build GeorgeApp.sln --configuration Release --no-restore

  - name: Test backend
    run: dotnet test GeorgeApp.sln --configuration Release --no-build --verbosity normal
```

frontend:
name: Frontend
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: frontend/GeorgeApp.Web

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '22.x'
      cache: 'npm'
      cache-dependency-path: frontend/GeorgeApp.Web/package-lock.json

  - name: Install frontend dependencies
    run: npm ci

  - name: Lint frontend
    run: npm run lint --if-present

  - name: Test frontend
    run: npm test -- --watch=false --browsers=ChromeHeadless --if-present

  - name: Build frontend
    run: npm run build --if-present
```
