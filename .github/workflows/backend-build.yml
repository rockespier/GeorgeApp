name: Backend Build

on:
push:
branches:
- main
- develop
paths:
- 'backend/**'
- '.github/workflows/backend-build.yml'

pull_request:
branches:
- main
- develop
paths:
- 'backend/**'
- '.github/workflows/backend-build.yml'

jobs:
build-backend:
name: Build Backend
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: backend

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup .NET
    uses: actions/setup-dotnet@v4
    with:
      dotnet-version: '9.0.x'

  - name: Restore dependencies
    run: dotnet restore GeorgeApp.sln

  - name: Build solution
    run: dotnet build GeorgeApp.sln --configuration Release --no-restore

  - name: Run tests
    run: dotnet test GeorgeApp.sln --configuration Release --no-build --verbosity normal
```
