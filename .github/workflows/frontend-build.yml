name: Frontend Build

on:
push:
branches:
- main
- develop
paths:
- 'frontend/**'
- '.github/workflows/frontend-build.yml'

pull_request:
branches:
- main
- develop
paths:
- 'frontend/**'
- '.github/workflows/frontend-build.yml'

jobs:
build-frontend:
name: Build Frontend
runs-on: ubuntu-latest

```
defaults:
  run:
    working-directory: frontend/GeorgeApp.Web

steps:
  - name: Checkout repository
    uses: actions/checkout@v4

  - name: Setup Node.js
    uses: actions/setup-node@v4
    with:
      node-version: '22.x'
      cache: 'npm'
      cache-dependency-path: frontend/GeorgeApp.Web/package-lock.json

  - name: Install dependencies
    run: npm ci

  - name: Run lint
    run: npm run lint --if-present

  - name: Run tests
    run: npm test -- --watch=false --browsers=ChromeHeadless --if-present

  - name: Build Angular app
    run: npm run build --if-present
```
